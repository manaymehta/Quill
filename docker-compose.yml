services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=8000
      - MONGO_URI=${MONGO_URI} # Injected from .env file
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET} # Injected from .env file
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID} # Injected from .env file
      - FASTAPI_SUMMARIZE_URL=http://fast_api:8000 # Connects effectively to the service name
    command: [ "npm", "run", "dev" ]
    depends_on:
      - fast_api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
    command: [ "npm", "run", "dev" ]

  fast_api:
    build:
      context: ./fast_api
      dockerfile: Dockerfile
    ports:
      - "8001:8001" # Maps host 8001 to container 8000
    volumes:
      - ./fast_api:/app
    environment:
      - NODE_ENV=development
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload" ]
