name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Backend Deploy
        env:
          HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl -s -X POST "$HOOK_URL"
            echo "Triggered backend deployment"
          else
            echo "RENDER_BACKEND_DEPLOY_HOOK_URL is not set. Skipping."
          fi

      - name: Trigger Render FastAPI Deploy
        env:
          HOOK_URL: ${{ secrets.RENDER_FASTAPI_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl -s -X POST "$HOOK_URL"
            echo "Triggered FastAPI deployment"
          else
            echo "RENDER_FASTAPI_DEPLOY_HOOK_URL is not set. Skipping."
          fi
